# Datasource — overridden at runtime via system properties or env vars
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:appuser}
quarkus.datasource.password=${DB_PASSWORD:apppassword}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/appdb}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# HTTP
quarkus.http.port=8080

# Dev mode live reload
%dev.quarkus.hibernate-orm.log.sql=true
